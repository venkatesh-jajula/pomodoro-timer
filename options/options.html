<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <h1>⏱️ Pomodoro Timer Settings</h1>
        
        <div class="settings-card">
            <h2>Timer Duration</h2>
            <p class="description">Set your preferred Pomodoro session duration</p>
            
            <div class="input-group">
                <label for="pomodoroTime">Session Duration (minutes)</label>
                <div class="range-input">
                        <input 
                            type="range" 
                            id="pomodoroTime" 
                            min="1" 
                            max="60" 
                            value="25"
                            class="slider"
                            aria-label="Session duration in minutes"
                        >
                        <span class="value-display" id="valueDisplay" aria-live="polite">25 min</span>
                </div>
            </div>
            
            <div class="info-box">
                <p>⚡ Quick presets:</p>
                <div class="preset-buttons">
                    <button class="preset-btn" data-value="5" type="button">5 min</button>
                    <button class="preset-btn" data-value="15" type="button">15 min</button>
                    <button class="preset-btn" data-value="25" type="button">25 min</button>
                    <button class="preset-btn" data-value="45" type="button">45 min</button>
                    <button class="preset-btn" data-value="60" type="button">60 min</button>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button id="saveBtn" class="btn btn-primary" type="button">Save Settings</button>
            <button id="resetBtn" class="btn btn-secondary" type="button">Reset to Default</button>
        </div>

        <div id="status" class="status-message"></div>
    </div>

    <script src="options.js"></script>
</body>
</html>
